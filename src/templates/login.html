{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-lg border border-gray-100">
        
        <!-- Título Dinâmico -->
        <h2 id="form-title" class="text-3xl font-extrabold text-center text-gray-900">Entre ou Cadastre-se</h2>
        
        <!-- Formulário Único que muda de ação via JS -->
        <form id="auth-form" class="space-y-4" action="/login" method="POST">
            
            <!-- Campo Nome (Escondido por padrão no Login) -->
            <div id="name-field" class="hidden">
                <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
                <input type="text" name="nome" class="w-full px-4 py-2 mt-1 border rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" name="email" required class="w-full px-4 py-2 mt-1 border rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Senha</label>
                <input type="password" name="senha" required class="w-full px-4 py-2 mt-1 border rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit" id="submit-btn" class="w-full py-2 text-white bg-blue-600 rounded-md hover:bg-blue-700 font-bold transition">
                Entrar
            </button>
        </form>

        <!-- Alternador de Telas -->
        <p class="text-center text-sm text-gray-600 mt-4">
            <span id="toggle-text">Não tem uma conta?</span>
            <button onclick="toggleAuth()" id="toggle-btn" class="text-blue-600 hover:underline font-semibold ml-1">
                Cadastre-se aqui
            </button>
        </p>
    </div>
</div>

<script>
function toggleAuth() {
    const form = document.getElementById('auth-form');
    const title = document.getElementById('form-title');
    const nameField = document.getElementById('name-field');
    const submitBtn = document.getElementById('submit-btn');
    const toggleText = document.getElementById('toggle-text');
    const toggleBtn = document.getElementById('toggle-btn');

    if (form.action.includes('/login')) {
        // Mudar para modo Cadastro
        form.action = "{{ url_for('cadastro') }}";
        nameField.classList.remove('hidden');
        nameField.querySelector('input').required = true;
        submitBtn.innerText = 'Criar Minha Conta';
        toggleText.innerText = 'Já possui uma conta?';
        toggleBtn.innerText = 'Faça Login';
    } else {
        // Mudar para modo Login
        form.action = "{{ url_for('login') }}";
        nameField.classList.add('hidden');
        nameField.querySelector('input').required = false;
        submitBtn.innerText = 'Entrar';
        toggleText.innerText = 'Não tem uma conta?';
        toggleBtn.innerText = 'Cadastre-se aqui';
    }
}
</script>
{% endblock %}
