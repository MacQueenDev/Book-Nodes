{% extends 'base.html' %}

{% block content %}
<h1 class="text-3xl font-bold mb-8">Nossa Biblioteca</h1>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for livro in livros %}
    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:scale-105 transition-transform">
        <img src="{{ livro.foto_url }}" class="w-full h-64 object-cover">
        <div class="p-4">
            <span class="text-blue-500 text-xs font-bold uppercase">{{ livro.categoria }}</span>
            <h2 class="text-xl font-bold">{{ livro.titulo }}</h2>
            <p class="text-gray-600 text-sm mt-2">{{ livro.resumo[:80] }}...</p>
            <div class="mt-4 flex justify-between items-center">
                <span class="text-lg font-bold">R$ {{ "%.2f"|format(livro.preco) }}</span>
                <a href="/livro/{{ livro.id }}" class="bg-blue-600 text-white px-4 py-2 rounded">Ver Detalhes</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
